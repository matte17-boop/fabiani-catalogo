*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0C0C0C;--white:#FFFFFF;
  --rosa:#F2E8E4;--rosa-mid:#E8D0C8;
  --rosa-dark:#C4958A;--rosa-accent:#B07268;
  --gray-light:#F7F4F2;--gray-mid:#C8C0BC;--gray-dark:#8A8280;
  --border:#E8E0DC;
}
html,body{height:100%;}
body{font-family:'TenorSans','Georgia',serif;background:var(--white);color:var(--black);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--white);padding:2rem;position:relative;overflow:hidden;}
#loginScreen::before{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;background:var(--rosa);z-index:0;}
.login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.login-logo{width:200px;height:auto;margin-bottom:40px;animation:scaleIn 0.9s cubic-bezier(0.16,1,0.3,1) both;}
.login-logo path{fill:var(--black);}
.login-eyebrow{font-size:8px;letter-spacing:0.32em;text-transform:uppercase;color:var(--rosa-accent);margin-bottom:40px;animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
.login-card{background:var(--white);border:1px solid var(--border);padding:48px 56px 44px;width:100%;max-width:360px;text-align:center;animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s both;box-shadow:0 20px 60px rgba(180,120,100,0.08);}
.login-card label{font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gray-dark);display:block;margin-bottom:20px;}
.login-card input{width:100%;border:none;border-bottom:1px solid var(--gray-mid);padding:12px 0;font-family:'TenorSans',serif;font-size:18px;letter-spacing:0.28em;text-align:center;background:transparent;color:var(--black);margin-bottom:32px;outline:none;transition:border-color 0.2s;}
.login-card input:focus{border-bottom-color:var(--rosa-dark);}
.login-card button{width:100%;background:var(--black);color:var(--white);border:none;padding:16px;font-family:'TenorSans',serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;cursor:pointer;transition:background 0.25s;}
.login-card button:hover{background:var(--rosa-accent);}
.login-error{font-size:11px;color:#b03a2e;margin-top:14px;display:none;letter-spacing:0.06em;}
#catalogScreen{display:none;min-height:100vh;animation:fadeIn 0.4s ease both;}
.top-bar{background:var(--black);color:rgba(255,255,255,0.5);padding:9px 48px;font-size:8px;letter-spacing:0.22em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.top-bar-dot{width:3px;height:3px;border-radius:50%;background:var(--rosa-dark);display:inline-block;margin-right:8px;}
.cat-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 48px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{width:90px;height:auto;}
.header-logo path{fill:var(--black);}
.header-right{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray-mid);}
.filters-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:0 48px;display:flex;align-items:stretch;height:50px;overflow-x:auto;}
.filter-btn{font-family:'TenorSans',serif;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray-dark);background:transparent;border:none;border-bottom:2px solid transparent;padding:0 18px;cursor:pointer;white-space:nowrap;transition:all 0.15s;height:100%;}
.filter-btn:hover{color:var(--black);}
.filter-btn.active{color:var(--black);border-bottom-color:var(--rosa-dark);}
.search-wrap{margin-left:auto;display:flex;align-items:center;flex-shrink:0;padding-left:24px;}
.search-wrap input{border:none;border-bottom:1px solid var(--gray-mid);padding:4px 0;font-family:'TenorSans',serif;font-size:10px;letter-spacing:0.1em;background:transparent;color:var(--black);width:180px;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-bottom-color:var(--rosa-dark);}
.search-wrap input::placeholder{color:var(--gray-mid);}
.count-bar{padding:10px 48px;border-bottom:1px solid var(--border);font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray-dark);display:flex;align-items:center;gap:10px;background:var(--gray-light);}
.count-dot{width:3px;height:3px;border-radius:50%;background:var(--rosa-dark);display:inline-block;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border);margin:36px 48px;}
.product-card{background:var(--white);border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;position:relative;transition:all 0.25s;}
.product-card:hover{box-shadow:0 8px 32px rgba(180,120,100,0.12);z-index:1;}
.product-img-wrap{aspect-ratio:1/1;background:var(--rosa);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);}
.product-card:hover .product-img-wrap img{transform:scale(1.06);}
.product-img-placeholder{font-size:28px;opacity:0.18;}
.product-body{padding:14px 16px 16px;border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.product-spec-wrap{flex:1;min-width:0;}
.product-brand{font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:var(--rosa-accent);margin-bottom:4px;}
.product-mat{font-size:11px;color:var(--black);line-height:1.45;}
.product-pietra{font-size:10px;color:var(--gray-dark);margin-top:3px;}
.product-price-wrap{text-align:right;flex-shrink:0;}
.product-price-old{font-size:9px;color:var(--gray-mid);text-decoration:line-through;display:block;margin-bottom:2px;}
.product-price{font-size:15px;color:var(--black);}
.product-badge{position:absolute;top:0;left:0;background:var(--black);color:var(--white);font-size:7px;letter-spacing:0.14em;padding:5px 10px;text-transform:uppercase;}
.loading-state{grid-column:1/-1;padding:100px;text-align:center;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gray-mid);line-height:3;}
.overlay{position:fixed;inset:0;background:rgba(12,12,12,0.78);z-index:500;display:none;align-items:center;justify-content:center;padding:2rem;}
.overlay.open{display:flex;animation:fadeIn 0.2s ease both;}
.lb-box{background:var(--white);max-width:640px;width:100%;display:flex;position:relative;max-height:88vh;overflow:hidden;animation:scaleIn 0.28s cubic-bezier(0.16,1,0.3,1) both;}
.lb-img{width:280px;min-width:280px;background:var(--rosa);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;}
.lb-img img{width:100%;height:100%;object-fit:cover;}
.lb-content{padding:36px 32px;flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.lb-brand{font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--rosa-accent);margin-bottom:10px;}
.lb-spec{font-size:20px;color:var(--black);line-height:1.4;margin-bottom:6px;}
.lb-pietra{font-size:13px;color:var(--gray-dark);margin-bottom:20px;}
.lb-price{font-size:26px;color:var(--black);margin-bottom:24px;}
.lb-price-old{font-size:14px;color:var(--gray-mid);text-decoration:line-through;margin-right:8px;}
.lb-sep{width:100%;height:1px;background:var(--border);margin-bottom:16px;}
.lb-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}

  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

document.getElementById("pwdInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doLogin();
});

function normalizeHeader(h) {
  h = h.trim().replace(/^"|"$/g, "").toLowerCase();
  if (h.indexOf("pietra") >= 0) return "pietra";
  if (h.indexOf("sku") >= 0) return "sku";
  if (h.indexOf("barrato") >= 0) return "prezzoold";
  if (h.indexOf("immagine") >= 0) return "imgurl";
  if (h.indexOf("prodotto") >= 0) return "url";
  if (h.indexOf("materiale") >= 0) return "materiale";
  if (h.indexOf("categoria") >= 0) return "categoria";
  if (h.indexOf("prezzo") >= 0) return "prezzo";
  if (h.indexOf("sconto") >= 0) return "sconto";
  if (h.indexOf("brand") >= 0) return "brand";
  return h.replace(/[^a-z]/g, "");
}

function parseCSV(csv) {
  var rows = csv.trim().split("\n");
  var headers = rows[0].split(",").map(normalizeHeader);
  return rows.slice(1).map(function(row) {
    var vals = [], cur = "", inQ = false;
    for (var i = 0; i < row.length; i++) {
      var ch = row[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    var obj = {};
    headers.forEach(function(h, i) { obj[h] = (vals[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  }).filter(function(p) { return p.brand && p.materiale; });
}

function loadData() {
  fetch(SHEET_CSV_URL)
    .then(function(r) { return r.text(); })
    .then(function(csv) { allProducts = parseCSV(csv); render(); })
    .catch(function() {
      document.getElementById("grid").innerHTML = '<div class="loading-state" style="color:#b03a2e">Errore caricamento.<br><span style="font-size:8px;opacity:.7">Verificare URL Google Sheet.</span></div>';
    });
}

function setFilter(cat, btn) {
  currentFilter = cat;
  var btns = document.querySelectorAll(".filter-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
  render();
}

function doSearch(val) { currentSearch = val.toLowerCase(); render(); }

function render() {
  var f = allProducts.filter(function(p) {
    var cat = p.categoria || "";
    var mc = currentFilter === "tutti" || cat === currentFilter;
    var q = currentSearch;
    var mq = !q || (p.materiale||"").toLowerCase().indexOf(q) >= 0 || (p.brand||"").toLowerCase().indexOf(q) >= 0 || (p.sku||"").toLowerCase().indexOf(q) >= 0 || (p.pietra||"").toLowerCase().indexOf(q) >= 0;
    return mc && mq;
  });
  document.getElementById("countLabel").textContent = f.length + " prodott" + (f.length === 1 ? "o" : "i");
  if (!f.length) {
    document.getElementById("grid").innerHTML = '<div class="loading-state">Nessun prodotto trovato</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < f.length; i++) {
    var p = f[i];
    var img = p.imgurl || "";
    var prezzo = p.prezzo || "";
    var prezzoOld = p.prezzoold || "";
    var sconto = p.sconto || "";
    var imgTag = img ? '<img src="' + img + '" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>' : '<div class="product-img-placeholder">&#128142;</div>';
    html += '<div class="product-card" data-i="' + i + '">';
    if (sconto) html += '<div class="product-badge">' + sconto + '</div>';
    html += '<div class="product-img-wrap">' + imgTag + '</div>';
    html += '<div class="product-body"><div class="product-spec-wrap">';
    html += '<div class="product-brand">' + (p.brand || "") + '</div>';
    html += '<div class="product-mat">' + (p.materiale || "") + '</div>';
    if (p.pietra) html += '<div class="product-pietra">' + p.pietra + '</div>';
    html += '</div><div class="product-price-wrap">';
    if (prezzoOld) html += '<span class="product-price-old">&#8364;' + prezzoOld + '</span>';
    if (prezzo) html += '<span class="product-price">&#8364;' + prezzo + '</span>';
    html += '</div></div></div>';
  }
  document.getElementById("grid").innerHTML = html;
  var cards = document.querySelectorAll(".product-card");
  for (var j = 0; j < cards.length; j++) {
    (function(idx) {
      cards[idx].addEventListener("click", function() { openLb(f[idx]); });
    })(j);
  }
}

function openLb(p) {
  var img = p.imgurl || "";
  document.getElementById("lbBrand").textContent = p.brand || "";
  document.getElementById("lbSpec").textContent = p.materiale || "";
  document.getElementById("lbPietra").textContent = p.pietra || "";
  document.getElementById("lbPietra").style.display = p.pietra ? "block" : "none";
  var priceHtml = p.prezzoold ? '<span class="lb-price-old">&#8364;' + p.prezzoold + '</span>' : "";
  priceHtml += "&#8364;" + (p.prezzo || "");
  document.getElementById("lbPrice").innerHTML = priceHtml;
  document.getElementById("lbImg").innerHTML = img ? '<img src="' + img + '" alt=""/>' : "&#128142;";
  var rows = [["Categoria", p.categoria || ""], ["Materiale", p.materiale || ""]];
  if (p.pietra) rows.push(["Pietra", p.pietra]);
  if (p.sku) rows.push(["SKU", p.sku]);
  if (p.sconto) rows.push(["Sconto", p.sconto]);
  document.getElementById("lbRows").innerHTML = rows.map(function(r) {
    return '<div class="lb-row"><span class="lb-row-k">' + r[0] + '</span><span class="lb-row-v">' + r[1] + '</span></div>';
  }).join("");
  document.getElementById("lbLink").href = p.url || "#";
  document.getElementById("lbLink").style.display = p.url ? "inline-block" : "none";
  document.getElementById("overlay").classList.add("open");
}

function closeLb() { document.getElementById("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target.id === "overlay") closeLb(); }
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeLb(); });

</script>
